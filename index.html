<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lærehjelp Pro - Interaktiv Læring</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f39c12;
            --dark: #2c3e50;
            --light: #f8f9fa;
            --ai-bubble: #e1f5fe;
            --user-bubble: #e8f5e9;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            background-color: var(--light);
            color: var(--dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* --- Landing & Trinn --- */
        #landing, #grade-select, #dashboard {
            padding: 40px 20px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .hero-image {
            width: 100%;
            max-width: 400px;
            height: 250px;
            background: #ddd;
            margin: 20px auto;
            border-radius: 20px;
            overflow: hidden;
        }

        .btn-main {
            padding: 15px 40px;
            font-size: 1.2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .grade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .grade-btn {
            padding: 15px;
            border: 2px solid var(--primary);
            background: white;
            border-radius: 8px;
            cursor: pointer;
        }

        /* --- Chat Grensesnitt --- */
        #ai-chat {
            max-width: 700px;
            margin: 20px auto;
            width: 95%;
        }

        #chat-window {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            height: 500px;
            display: flex;
            flex-direction: column;
        }

        #chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80% ;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
        }

        .ai-msg { background: var(--ai-bubble); align-self: flex-start; border-bottom-left-radius: 2px; }
        .user-msg { background: var(--user-bubble); align-self: flex-end; border-bottom-right-radius: 2px; }

        .chat-input-area {
            padding: 20px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .status-tag {
            font-size: 0.8rem;
            color: #7f8c8d;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <section id="landing">
        <h1>Velkommen til Lærehjelp</h1>
        <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=400" alt="Læring" style="width:100%; height:100%; object-fit:cover;">
        </div>
        <button class="btn-main" onclick="showSection('grade-select')">Start</button>
    </section>

    <section id="grade-select" class="hidden">
        <h2>Hvilket trinn går du på?</h2>
        <div class="grade-grid" id="gradeButtons"></div>
    </section>

    <section id="dashboard" class="hidden">
        <h2 id="welcome-title">Lærehjelp</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 20px;">
            <button class="btn-main" onclick="showSection('ai-chat')" style="background: #8e44ad;">🤖 AI Chat</button>
            <button class="btn-main" onclick="alert('Quiz kommer!')">📝 Quiz</button>
            <button class="btn-main" onclick="alert('Gloser kommer!')">🔤 Gloser</button>
        </div>
    </section>

    <section id="ai-chat" class="hidden">
        <div id="chat-window">
            <div id="chat-messages">
                <div class="message ai-msg">Hei! Jeg er din lærepartner. Jeg forklarer deg ting, men du må vise at du forstår før vi går videre. Hva vil du lære om i dag?</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="Skriv her...">
                <button class="btn-main" onclick="sendMessage()" style="padding: 10px 20px;">Send</button>
            </div>
        </div>
        <center><button onclick="showSection('dashboard')" style="background:none; border:none; color:blue; cursor:pointer; margin-top:10px;">← Tilbake</button></center>
    </section>

    <script>
        // Logikk for trinn
        const grades = ["3. klasse", "4. klasse", "5. klasse", "6. klasse", "7. klasse", "8. klasse", "9. klasse", "10. klasse", "VG1", "VG2", "VG3"];
        const grid = document.getElementById('gradeButtons');
        grades.forEach(g => {
            const b = document.createElement('button');
            b.className = 'grade-btn';
            b.innerText = g;
            b.onclick = () => {
                document.getElementById('welcome-title').innerText = "Lærehjelp for " + g;
                showSection('dashboard');
            };
            grid.appendChild(b);
        });

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // --- AVANSERT AI LOGIKK ---
        let chatState = "idle"; // idle, waiting_for_note, waiting_for_answer
        let correctAnswer = "";

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}-msg`;
            msgDiv.innerText = text;
            document.getElementById('chat-messages').appendChild(msgDiv);
            const win = document.getElementById('chat-messages');
            win.scrollTop = win.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if (!val) return;

            addMessage(val, 'user');
            input.value = "";

            setTimeout(() => {
                handleAIResponse(val.toLowerCase());
            }, 600);
        }

        function handleAIResponse(val) {
            // 1. Sjekk om vi venter på at brukeren skal ta notater
            if (chatState === "waiting_for_note") {
                if (val.includes("ok") || val.includes("notert") || val.includes("ferdig")) {
                    chatState = "waiting_for_answer";
                    correctAnswer = "oslo"; // Eksempel-svar
                    addMessage("Supert! Da er du klar for en sjekk. Hva er hovedstaden i Norge?", "ai");
                } else {
                    addMessage("Skriv 'notert' eller 'ok' når du har skrevet det ned, så går vi videre!", "ai");
                }
                return;
            }

            // 2. Sjekk om vi venter på et svar (kontrollspørsmål)
            if (chatState === "waiting_for_answer") {
                if (val.includes(correctAnswer)) {
                    chatState = "idle";
                    addMessage("Helt riktig! Bra jobbet. Nå har du kontroll på dette. Er det noe annet du lurer på?", "ai");
                } else {
                    addMessage("Ikke helt riktig. Husk at dette er den største byen i Norge og ligger innerst i en fjord. Prøv å svare på nytt!", "ai");
                }
                return;
            }

            // 3. Vanlig modus - AI forklarer og setter en sperre
            if (val.includes("hovedstaden") || val.includes("norge")) {
                addMessage("Hovedstaden i Norge er Oslo. Der ligger Stortinget og Slottet. Før vi går videre, vil jeg at du tar et notat om dette. Skriv 'notert' når du er ferdig.", "ai");
                chatState = "waiting_for_note";
            } else if (val.includes("fotosyntese")) {
                addMessage("Fotosyntese er når planter bruker sollys, vann og CO2 for å lage sukker og oksygen. Skriv dette ned i boka di eller på en lapp, og si 'ok' når du er klar for et spørsmål.", "ai");
                chatState = "waiting_for_note";
                correctAnswer = "oksygen"; // Neste spørsmål vil handle om dette
            } else {
                addMessage("Det kan jeg hjelpe deg med! Men først må vi legge en plan. Vil du at jeg skal forklare konseptet først, eller vil du ha et hint?", "ai");
            }
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage() });
    </script>
</body>
</html>
